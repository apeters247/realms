# REALMS Docker Compose — standalone, joins estimabio network for shared infra.
# Usage (from /var/www/realms):
#   docker compose up -d --build

x-common-env: &common-env
  PYTHONPATH: /app
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_USER: ${POSTGRES_USER:-estimabio}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-realms}
  LITELLM_API_BASE: ${LITELLM_API_BASE:-http://litellm:4000}
  LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-dummy}
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-estimabio123}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  REALMS_PAIR_MODEL: ${REALMS_PAIR_MODEL:-google/gemini-2.0-flash-001}
  REALMS_PAIR_FALLBACK: ${REALMS_PAIR_FALLBACK:-deepseek/deepseek-chat}
  # Phase 4 — set REALMS_REVIEW_TOKEN in .env to enable review write endpoints.
  REALMS_REVIEW_TOKEN: ${REALMS_REVIEW_TOKEN:-}
  REALMS_REVIEW_REVIEWER: ${REALMS_REVIEW_REVIEWER:-anonymous}
  REALMS_REVIEW_MODEL: ${REALMS_REVIEW_MODEL:-google/gemini-2.0-flash-001}
  REALMS_REVIEW_FALLBACK: ${REALMS_REVIEW_FALLBACK:-deepseek/deepseek-chat}

services:
  realms-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: realms:latest
    container_name: realms-api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '2g'
        reservations:
          cpus: '0.5'
          memory: '512m'
    ports:
      - "127.0.0.1:8005:8001"
      - "127.0.0.1:8006:8001"
    environment:
      <<: *common-env
      HOST: 0.0.0.0
      PORT: 8001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # 600/min works for the SSG build loop that hits ~65 paginated pages
      # back-to-back. Cloudflare handles real abuse protection in front.
      REALMS_RATE_LIMIT_PER_MINUTE: ${REALMS_RATE_LIMIT_PER_MINUTE:-600}
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
      - ./web:/app/web
      - ./web-next/dist:/app/web-next/dist
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - realms-raw-cache:/app/data/raw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - estimabio-network

  realms-ingestor:
    image: realms:latest
    container_name: realms-ingestor
    depends_on:
      realms-api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: '1g'
    environment:
      <<: *common-env
      REALMS_INGESTOR_POLL_INTERVAL: "20"
      REALMS_INGESTOR_IDLE_SLEEP: "60"
      REALMS_INGESTOR_MAX_CHUNKS: "8"
      # Free-tier OpenRouter models are rate-limited (~20 req/min each).
      # Keep concurrency low and rely on the multi-model fallback chain.
      REALMS_INGESTOR_CHUNK_CONCURRENCY: "2"
      REALMS_EXTRACTION_MODEL: nvidia/nemotron-3-super-120b-a12b:free
      REALMS_EXTRACTION_FALLBACK_MODELS: openai/gpt-oss-120b:free,google/gemma-4-26b-a4b-it:free,nvidia/nemotron-3-nano-30b-a3b:free,openai/gpt-oss-20b:free
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
      - realms-raw-cache:/app/data/raw
      - realms-pubmed-cache:/app/data/pubmed
      - realms-archive-cache:/app/data/archive_org
    command: ["python", "-m", "scripts.run_ingestor"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - estimabio-network

  # Second ingestor instance — doubles throughput. Same image, same DB,
  # SELECT FOR UPDATE SKIP LOCKED ensures no two workers claim the same source.
  realms-ingestor-2:
    image: realms:latest
    container_name: realms-ingestor-2
    depends_on:
      realms-api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: '1g'
    environment:
      <<: *common-env
      REALMS_INGESTOR_POLL_INTERVAL: "20"
      REALMS_INGESTOR_IDLE_SLEEP: "60"
      REALMS_INGESTOR_MAX_CHUNKS: "8"
      REALMS_INGESTOR_CHUNK_CONCURRENCY: "2"
      # Free-tier models; different lead so the 4 workers don't all hit
      # the same model's rate limit simultaneously.
      REALMS_EXTRACTION_MODEL: openai/gpt-oss-120b:free
      REALMS_EXTRACTION_FALLBACK_MODELS: nvidia/nemotron-3-super-120b-a12b:free,google/gemma-4-26b-a4b-it:free,openai/gpt-oss-20b:free,nvidia/nemotron-3-nano-30b-a3b:free
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
      - realms-raw-cache:/app/data/raw
      - realms-pubmed-cache:/app/data/pubmed
      - realms-archive-cache:/app/data/archive_org
    command: ["python", "-m", "scripts.run_ingestor"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - estimabio-network

  realms-ingestor-3:
    image: realms:latest
    container_name: realms-ingestor-3
    depends_on:
      realms-api:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    deploy:
      resources:
        limits: { cpus: '1.5', memory: '1g' }
    environment:
      <<: *common-env
      REALMS_INGESTOR_POLL_INTERVAL: "20"
      REALMS_INGESTOR_IDLE_SLEEP: "60"
      REALMS_INGESTOR_MAX_CHUNKS: "8"
      REALMS_INGESTOR_CHUNK_CONCURRENCY: "2"
      REALMS_EXTRACTION_MODEL: openai/gpt-oss-20b:free
      REALMS_EXTRACTION_FALLBACK_MODELS: nvidia/nemotron-3-nano-30b-a3b:free,inclusionai/ling-2.6-flash:free,openai/gpt-oss-120b:free,nvidia/nemotron-3-super-120b-a12b:free
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
      - realms-raw-cache:/app/data/raw
      - realms-pubmed-cache:/app/data/pubmed
      - realms-archive-cache:/app/data/archive_org
    command: ["python", "-m", "scripts.run_ingestor"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - estimabio-network

  realms-ingestor-4:
    image: realms:latest
    container_name: realms-ingestor-4
    depends_on:
      realms-api:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    deploy:
      resources:
        limits: { cpus: '1.5', memory: '1g' }
    environment:
      <<: *common-env
      REALMS_INGESTOR_POLL_INTERVAL: "20"
      REALMS_INGESTOR_IDLE_SLEEP: "60"
      REALMS_INGESTOR_MAX_CHUNKS: "8"
      REALMS_INGESTOR_CHUNK_CONCURRENCY: "2"
      REALMS_EXTRACTION_MODEL: nvidia/nemotron-3-super-120b-a12b:free
      REALMS_EXTRACTION_FALLBACK_MODELS: google/gemma-4-26b-a4b-it:free,openai/gpt-oss-120b:free,nvidia/nemotron-3-nano-30b-a3b:free,inclusionai/ling-2.6-flash:free
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
      - realms-raw-cache:/app/data/raw
      - realms-pubmed-cache:/app/data/pubmed
      - realms-archive-cache:/app/data/archive_org
    command: ["python", "-m", "scripts.run_ingestor"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - estimabio-network

  realms-neo4j-sync:
    image: realms:latest
    container_name: realms-neo4j-sync
    depends_on:
      realms-api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512m'
    environment:
      <<: *common-env
      REALMS_SYNC_INTERVAL: "30"
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
    command: ["python", "-m", "scripts.run_neo4j_sync"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/proc/1/status') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - estimabio-network

volumes:
  realms-raw-cache:
  realms-pubmed-cache:
  realms-archive-cache:

networks:
  estimabio-network:
    external: true
    name: herbalist_estimabio-network
