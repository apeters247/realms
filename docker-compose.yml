# REALMS Docker Compose — standalone, joins estimabio network for shared infra.
# Usage (from /var/www/realms):
#   docker compose up -d --build

services:
  realms-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: realms:latest
    container_name: realms-api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '2g'
        reservations:
          cpus: '0.5'
          memory: '512m'
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PYTHONPATH=/app
      # Shared Postgres (running as part of estimabio stack)
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-estimabio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-realms}
    volumes:
      - ./realms:/app/realms
      - ./scripts:/app/scripts
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - estimabio-network

networks:
  estimabio-network:
    external: true
    name: herbalist_estimabio-network
