<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf9f6"/>
      <stop offset="100%" stop-color="#f2efe5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect x="80" y="600" width="1040" height="2" fill="#1a1815"/>

  <!-- Tiny hairline top ornament -->
  <rect x="80" y="80" width="160" height="1" fill="#1a1815" opacity="0.6"/>

  <text x="80" y="120" font-family="Inter, system-ui, sans-serif"
        font-size="20" font-weight="500" letter-spacing="3"
        fill="#4a4642">REALMS</text>

  <text x="80" y="270" font-family="Fraunces, Georgia, serif"
        font-size="84" font-weight="500" fill="#1a1815"
        letter-spacing="-2">
    An archive of the
  </text>
  <text x="80" y="360" font-family="Fraunces, Georgia, serif"
        font-size="84" font-weight="500" fill="#1a1815"
        letter-spacing="-2">
    spiritual entities humans
  </text>
  <text x="80" y="450" font-family="Fraunces, Georgia, serif"
        font-size="84" font-weight="500" font-style="italic" fill="#7a1f13"
        letter-spacing="-2">
    have documented.
  </text>

  <text x="80" y="560" font-family="Inter, system-ui, sans-serif"
        font-size="22" fill="#4a4642">
    Every claim traces to a source. Every source traces to a text.
  </text>
</svg>
